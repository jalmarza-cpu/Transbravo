server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # HTML: NUNCA cachear — siempre sirve la versión más nueva del servidor
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ /index.html;
    }

    # Imágenes y videos: caché de 7 días (cambian poco)
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|mp4|webm)$ {
        add_header Cache-Control "public, max-age=604800";
        expires 7d;
        try_files $uri =404;
    }

    # JS y CSS: caché de 1 día
    location ~* \.(css|js|woff|woff2|ttf)$ {
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
        try_files $uri =404;
    }

    # Todo lo demás
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Gzip para mejor rendimiento
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;
}
